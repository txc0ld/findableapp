# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "c010253ca5cf76889ab73e474f0d686e"
name = "FindAble"
application_url = "https://api.getfindable.au/app"
embedded = false

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [webhooks.privacy_compliance]
  customer_deletion_url = "https://api.getfindable.au/shopify/webhooks"
  customer_data_request_url = "https://api.getfindable.au/shopify/webhooks"
  shop_deletion_url = "https://api.getfindable.au/shopify/webhooks"

  [[webhooks.subscriptions]]
  topics = [
  "app/uninstalled",
  "bulk_operations/finish",
  "products/create",
  "products/delete",
  "products/update"
]
  uri = "https://api.getfindable.au/shopify/webhooks"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_locales,read_products,read_script_tags,write_script_tags,read_themes"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [ "https://api.getfindable.au/shopify/callback" ]

[app_proxy]
url = "https://api.getfindable.au/proxy/findable"
subpath = "findable"
prefix = "apps"

[pos]
embedded = false
